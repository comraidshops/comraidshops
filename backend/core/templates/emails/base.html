<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject|default:"ComraidShops" }}</title>
    <style>
        /* CSS Reset for Email */
        body, table, td, p, a, h1, h2, h3, h4, h5, h6 {
            margin: 0; padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }
        table { border-spacing: 0; border-collapse: collapse; }
        img { border: 0; line-height: 100%; outline: none; text-decoration: none; display: block; }
        
        /* Dark / Minimal / Premium Theme */
        body {
            background-color: #0d0d0d;
            color: #f2f2f2;
            line-height: 1.6;
        }
        .wrapper {
            width: 100%;
            background-color: #0d0d0d;
            padding: 40px 0;
        }
        .content-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #333333;
        }
        .header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 1px solid #333333;
        }
        .header h1 {
            font-family: 'Georgia', serif; /* Editorial feel */
            font-size: 28px;
            font-weight: normal;
            letter-spacing: 2px;
            color: #ffffff;
            text-transform: uppercase;
        }
        .body-content {
            padding: 40px 30px;
        }
        .body-content h2 {
            font-size: 20px;
            font-weight: normal;
            margin-bottom: 20px;
            color: #ffffff;
            font-family: 'Georgia', serif;
        }
        .body-content p {
            font-size: 15px;
            color: #cccccc;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .btn-container {
            text-align: center;
            margin: 30px 0;
        }
        .btn {
            background-color: #ffffff;
            color: #000000 !important;
            padding: 14px 28px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 2px;
            display: inline-block;
        }
        .footer {
            text-align: center;
            padding: 30px 20px;
            background-color: #111111;
            border-top: 1px solid #333333;
        }
        .footer p {
            font-size: 12px;
            color: #666666;
            margin-bottom: 10px;
        }
        .footer a {
            color: #999999;
            text-decoration: none;
        }
        .greeting {
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 15px;
        }
        
        /* Utility classes */
        .text-center { text-align: center; }
        .mt-20 { margin-top: 20px; }
        .mb-10 { margin-bottom: 10px; }
        
        @media screen and (max-width: 600px) {
            .content-container {
                width: 100% !important;
                border: none !important;
                border-radius: 0 !important;
            }
        }
    </style>
</head>
<body>
    <table class="wrapper" width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center">
                <table class="content-container" cellpadding="0" cellspacing="0">
                    <!-- Header -->
                    <tr>
                        <td class="header">
                            <h1>COMRAIDSHOPS</h1>
                        </td>
                    </tr>
                    
                    <!-- Body Content -->
                    <tr>
                        <td class="body-content">
                            {% block content %}
                            {% endblock %}
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td class="footer">
                            <p>You received this email from your account at ComraidShops.</p>
                            <p>
                                <a href="https://comraidshops.com">Website</a> &nbsp;|&nbsp; 
                                <a href="https://comraidshops.com/contact">Support</a> &nbsp;|&nbsp; 
                                <a href="https://comraidshops.com/privacy-policy">Privacy</a>
                            </p>
                            <p style="margin-top:20px; color:#444;">&copy; {{ current_year|default:"2026" }} ComraidShops. All rights reserved.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
